name: Mein Build Server Test

on: [push]

jobs:
  test-job:
    # Greift auf Ihren eigenen Server zu
    runs-on: self-hosted

    steps:
      - name: Code aus dem Repository herunterladen
        uses: actions/checkout@v4

      - name: Prüfe die NodeJS Version auf meiner VM
        run: node -v

      - name: Prüfe ob Docker auf meiner VM funktioniert
        run: docker --version
# Test
