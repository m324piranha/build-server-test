name: Build Server Test

on: [push]

jobs:
  check-bats-version:
    # Exakt so vorgegeben in deiner Aufgabenstellung:
    runs-on:
      group: ubuntu-runners
      labels: ubuntu-20.04-16core

    steps:
      - name: Code aus dem Repository herunterladen
        uses: actions/checkout@v4

      - name: Prüfe die NodeJS Version auf meiner VM
        run: node -v

      - name: Prüfe ob Docker auf meiner VM funktioniert
        run: docker --version
