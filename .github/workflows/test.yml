name: Build Server Test

on: [push]

jobs:
  check-bats-version:
    # Geändert auf 'self-hosted', damit dein frisch installierter Runner sofort anspringt:
    runs-on: self-hosted

    steps:
      - name: Code aus dem Repository herunterladen
        uses: actions/checkout@v4

      - name: Prüfe die NodeJS Version auf meiner VM
        run: node -v

      - name: Prüfe ob Docker auf meiner VM funktioniert
        run: docker --version
